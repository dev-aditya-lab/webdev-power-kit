name: Publish Package

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for OIDC support
        run: |
          npm install -g npm@latest
          npm --version

      - name: Check if version already published
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version 2>/dev/null; then
            echo "publish=false" >> $GITHUB_OUTPUT
            echo "$NAME@$VERSION already on npm — skipping"
          else
            echo "publish=true" >> $GITHUB_OUTPUT
          fi

      - run: npm ci
        if: steps.check.outputs.publish == 'true'

      - run: npm run build --if-present
        if: steps.check.outputs.publish == 'true'

      - run: npm publish
        if: steps.check.outputs.publish == 'true'

  publish-gpr:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@dev-aditya-lab'

      - run: npm ci
      - run: npm run build --if-present

      - name: Set scoped name for GitHub Packages
        run: npm pkg set name="@dev-aditya-lab/webdev-power-kit"

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}